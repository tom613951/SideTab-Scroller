name: build

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\SideTabScroller.slnx

      - name: Build
        run: dotnet build .\SideTabScroller.slnx -c Release --no-restore
